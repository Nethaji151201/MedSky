<!doctype html>
<html lang="en">
  <head>
    <!-- Basic SEO -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />

    <!-- Title (Very Important for Ranking) -->
    <title>Medsky – Healthcare Solutions</title>

    <!-- Meta Description -->
    <meta
      name="description"
      content="MedSky Healthcare provides advanced clinic and hospital management software including OPD, IPD, billing, e-prescription, pharmacy, lab, and appointment scheduling. Transform your healthcare system with smart automation."
    />

    <!-- Keywords -->
    <meta
      name="keywords"
      content="clinic management software, hospital management system, healthcare software India, OPD management, IPD system, e-prescription software, pharmacy management, medical software Chennai"
    />

    <!-- Author -->
    <meta name="author" content="MedSky Healthcare" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.medsky.in/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/medsky_logo4.png" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:title" content="Medsky – Healthcare Solutions" />
    <meta
      property="og:description"
      content="Simplify healthcare with MedSky. Manage patients, billing, pharmacy, lab, and appointments in one powerful system."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.medsky.in/" />
    <meta property="og:image" content="https://www.medsky.in/preview.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Medsky – Healthcare Solutions" />
    <meta
      name="twitter:description"
      content="All-in-one healthcare software for clinics and hospitals. Improve efficiency and patient care with MedSky."
    />
    <meta name="twitter:image" content="https://www.medsky.in/preview.jpg" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data (VERY IMPORTANT FOR SEO) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "MedSky Healthcare",
        "applicationCategory": "HealthcareApplication",
        "operatingSystem": "Web",
        "description": "Advanced clinic and hospital management software with OPD, IPD, billing, lab, pharmacy, and appointment modules.",
        "url": "https://www.medsky.in/",
        "publisher": {
          "@type": "Organization",
          "name": "MedSky Healthcare"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "INR"
        }
      }
    </script>
  </head>

  <body>
    <noscript>
      MedSky Healthcare provides advanced clinic and hospital management
      solutions including OPD, IPD, billing, pharmacy, and lab systems.
    </noscript>

    <div id="root"></div>

    <!-- Main React Entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
